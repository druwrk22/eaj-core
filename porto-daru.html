<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... — Andaru Triadi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: grid;
            place-items: center;
            overflow: hidden;
            margin: 0;
        }

        /* Glassmorphism Card */
        .redirect-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
            max-width: 380px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        /* Animated Progress Bar */
        .progress-loader {
            height: 6px;
            width: 100%;
            background: #e2e8f0;
            border-radius: 100px;
            margin: 2rem 0;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 100px;
            animation: loadProgress 2s linear forwards;
        }

        .brand-text {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(to right, #1e293b, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .status-text {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Minimalist vibe decoration */
        .circle-deco {
            position: absolute;
            z-index: -1;
            border-radius: 50%;
            background: rgba(37, 99, 235, 0.05);
            filter: blur(40px);
        }
    </style>
</head>
<body>

    <div class="circle-deco" style="width: 300px; height: 300px; top: -50px; right: -50px;"></div>
    <div class="circle-deco" style="width: 200px; height: 200px; bottom: 20px; left: -30px;"></div>

    <main class="redirect-card">
        <div class="brand-text">Redirecting...</div>
        <p class="status-text">Membuka portofolio Andaru Triadi</p>
        
        <div class="progress-loader">
            <div class="progress-fill"></div>
        </div>

        <p class="status-text" style="font-size: 0.75rem;">Harap tunggu sebentar</p>
    </main>

    <script>
        // Redirect setelah 2 detik (2000ms)
        setTimeout(() => {
            window.location.href = "https://broandaru.netlify.app/index.html?popup=porto";
        }, 2000);
    </script>

</body>
</html>
